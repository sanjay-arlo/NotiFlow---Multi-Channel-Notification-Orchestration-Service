{% extends "base.html" %}

{% block content %}
<div style="background: #fff3cd; border: 1px solid #ffeaa7; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
    <h3 style="color: #856404; margin-top: 0;">⚠️ Alert</h3>
</div>

<div style="background: #f8d7da; border-left: 4px solid #f5c6cb; padding: 20px; margin-bottom: 20px;">
    {{ body | safe }}
</div>

{% if action_url %}
<div style="text-align: center; margin-top: 30px;">
    <a href="{{ action_url }}" style="background: #dc3545; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px;">
        {{ action_text or 'Take Action' }}
    </a>
</div>
{% endif %}

{% if additional_info %}
<div style="background: #e2e3e5; padding: 15px; border-radius: 6px; margin-top: 20px;">
    <h4>Additional Information:</h4>
    {{ additional_info | safe }}
</div>
{% endif %}
{% endblock %}
